<!DOCTYPE html>
<html>
<head>
  <title>Kessy Labs Login</title>
</head>
<body>

<h2>Kessy Labs Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDYLGSbebsE_1N4xomF0VBvbmXxYLOqNno",
    authDomain: "kessylabs.firebaseapp.com",
    projectId: "kessylabs",
    storageBucket: "kessylabs.firebasestorage.app",
    messagingSenderId: "571217407156",
    appId: "1:571217407156:web:1f2af244f9976ce36cbbe1",
    measurementId: "G-705MF5SCND"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.signup = function () {
    createUserWithEmailAndPassword(auth, email.value, password.value)
      .then(() => alert("Account created successfully!"))
      .catch(err => alert(err.message));
  }

  window.login = function () {
    signInWithEmailAndPassword(auth, email.value, password.value)
      .then(() => window.location.href = "dashboard.html")
      .catch(err => alert(err.message));
  }
</script>

</body>
</html>
