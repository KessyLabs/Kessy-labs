<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h1>Welcome to Kessy Labs 🔥</h1>
<button onclick="logout()">Logout</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDYLGSbebsE_1N4xomF0VBvbmXxYLOqNno",
    authDomain: "kessylabs.firebaseapp.com",
    projectId: "kessylabs",
    storageBucket: "kessylabs.firebasestorage.app",
    messagingSenderId: "571217407156",
    appId: "1:571217407156:web:1f2af244f9976ce36cbbe1",
    measurementId: "G-705MF5SCND"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "login.html";
    }
  });

  window.logout = function () {
    signOut(auth).then(() => {
      window.location.href = "login.html";
    });
  }
</script>

</body>
</html>
